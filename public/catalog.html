<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Catalog — HenHud Helps</title>
    <link rel="stylesheet" href="style.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<script type="module" src="script.js"></script>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">
        <h2>HenHud Helps</h2>
        <p>Lost & Found For Students</p>
    </div>
    <div class="nav-links">
        <a href="https://www.henhudschools.org/" class="active">HenHud Website</a>
        <a href="index.html">Homepage</a>
        <a href="submit.html">Submit Item</a>
        <a href="catalog.html">Item Catalog</a>
        <a href="guide.html">Guide</a>
    </div>
    <a href="enter.html" target="_blank" rel="noopener noreferrer">
        <div class="nav-icons">
           <i class="fa-solid fa-person"></i>
        </div>
    </a>
</nav>

<!-- CATALOG HERO -->
<section class="catalog-hero">
    <h2>Item Catalog</h2>
    <p>Browse all lost and found items submitted by HenHud students</p>
</section>

<!-- SEARCH + FILTER -->
<section class="catalog-controls">
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search by name, location, description...">
        <button id="searchBtn"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
    </div>

    <div class="category-tabs">
        <button class="cat-tab active" data-cat="all">
            <i class="fa-solid fa-border-all"></i> See All
        </button>
        <button class="cat-tab" data-cat="lost">
            <i class="fa-solid fa-circle-question"></i> Lost
        </button>
        <button class="cat-tab" data-cat="found">
            <i class="fa-solid fa-circle-check"></i> Found
        </button>
        <button class="cat-tab" data-cat="returned">
            <i class="fa-solid fa-rotate-left"></i> Returned
        </button>
    </div>
</section>

<!-- ITEM GRID -->
<section class="catalog-section">
    <p id="resultsCount" class="results-count"></p>
    <div id="itemList" class="item-grid"></div>
</section>

<!-- FOOTER -->
<footer class="footer">
    <div class="footer-content">
        <img src="https://resources.finalsite.net/images/f_auto,q_auto,t_image_size_2/v1691159592/henhudschoolsorg/ik5chnsgkn3kc7fjfilv/Copyof2014_Official_Logo_Large1.png" alt="HenHud Logo" class="footer-logo">
        <p>© 2026 HenHud Helps | Lost & Found Website</p>
    </div>
</footer>

</body>
</html>
