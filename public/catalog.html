<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Catalog — HenHud Helps</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .filter-row {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .filter-row select {
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            background: white;
            color: #1d2b4f;
            cursor: pointer;
            outline: none;
            width: 160px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">
        <h2>HenHud Helps</h2>
        <p>Lost & Found For Students</p>
    </div>
    <div class="nav-links">
        <a href="https://www.henhudschools.org/" class="active">HenHud Website</a>
        <a href="index.html">Homepage</a>
        <a href="submit.html">Submit Item</a>
        <a href="catalog.html">Item Catalog</a>
        <a href="guide.html">Guide</a>
    </div>
    <a href="enter.html" target="_blank" rel="noopener noreferrer">
        <div class="nav-icons">
            <i class="fa-solid fa-person"></i>
        </div>
    </a>
</nav>

<section class="page-hero">
    <h2>Item Catalog</h2>
    <p>Browse all lost and found items submitted by students</p>
</section>

<section class="catalog">

    <div class="search-wrapper">
        <div>
            <!-- Search Bar -->
            <div class="search-bar">
                <input type="text" placeholder="Search by name, location, description...">
                <button>Search</button>
            </div>

            <!-- Filter + Sort Row -->
            <div class="filter-row">
                <select id="categoryFilter">
                    <option value="all">All Categories</option>
                    <option value="lost">Lost</option>
                    <option value="found">Found</option>
                    <option value="returned">Returned</option>
                </select>

                <select id="sortFilter">
                    <option value="newest">Newest First</option>
                    <option value="oldest">Oldest First</option>
                    <option value="name-az">Name A → Z</option>
                    <option value="name-za">Name Z → A</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Item List -->
    <div id="itemList"></div>

</section>

<!-- FOOTER -->
<footer class="footer">
    <div class="footer-content">
        <img src="https://resources.finalsite.net/images/f_auto,q_auto,t_image_size_2/v1691159592/henhudschoolsorg/ik5chnsgkn3kc7fjfilv/Copyof2014_Official_Logo_Large1.png" alt="HenHud Logo" class="footer-logo">
        <p>© 2026 HenHud Helps | Lost & Found Website</p>
    </div>
</footer>

<script type="module" src="script.js"></script>
</body>
</html>
