<!DOCTYPE html>
<link rel="stylesheet" href="style.css">
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submission Form</title>

    <!-- CSS -->
     <link rel="stylesheet" href="style.css"> 
    <!-- Free Font Awesome (WORKING VERSION) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">
        <h2>HenHud Helps</h2>
        <p>Lost & Found For Students</p>
    </div>

    <div class="nav-links">
        <a href="https://www.henhudschools.org/" class="active">HenHud Website</a>
         <a href="index.html">Homepage</a>
        <a href="submit.html">Submit Item</a>
        <a href="catalog.html">Item Catalog</a>
        <a href="guide.html">Guide</a>
       
    </div>

    <div class="nav-icons">
        <i class="fa-solid fa-bell"></i>
   
       <i class="fa-solid fa-envelope"></i>
    </div>
</nav>

    <div class="form-container">

        <form>

            <label>Your Name</label>
            <input type="text" placeholder="Enter your full name">
            
            <label>Item Type</label>
            <div class="item-type">
                <button type="button" class="active">Lost</button>
                <button type="button">Found</button>
            </div>

            <label>Location</label>
            <input type="text" placeholder="Where was it lost/found?">

            <label>Date</label>
            <input type="date">

            <label>Item Description</label>
            <textarea placeholder="Describe the item (color, brand, etc.)"></textarea>

            <label>Upload Photo (Optional)</label>
            <input type="file">

            <button type="submit" class="submit-btn">Submit</button>

        </form>

        

    </div>

<!-- FOOTER -->
<footer>
    © 2026 HenHud Helps | Lost & Found Website
</footer>

</body>

</html>
